# Production stack: nginx reverse proxy in front of the SPA + FastAPI backend.
#
# Only the `proxy` service is published to the host (ports 80/443). The backend
# and frontend are reachable solely over the internal Docker network, so the
# proxy is the single entry point and TLS terminates there.
#
# Required variables in .env (see .env.example and DEPLOYMENT.md):
#   SERVER_NAME  — the public domain, e.g. example.com
#   ADMIN_PATH   — the secret admin slug, e.g. panel-ab12cd34
#   POSTGRES_*, ADMIN_*, JWT_*, CORS_ORIGINS
#
# Bring up:  docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persist uploaded CV files across restarts/redeploys.
      - uploads:/app/uploads
    # No host port published — only the proxy reaches the backend internally.
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Same-origin in production: the proxy serves the API and the SPA on
        # the same domain, so the frontend calls /api/... relatively.
        VITE_API_URL: ""
    # No host port published — only the proxy reaches the frontend internally.
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    environment:
      # Consumed by envsubst to render the config template at startup.
      SERVER_NAME: ${SERVER_NAME}
      ADMIN_PATH: ${ADMIN_PATH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mounted OUTSIDE /etc/nginx/templates so only our explicit envsubst below
      # renders it (substituting just SERVER_NAME/ADMIN_PATH and keeping the
      # nginx runtime vars like $host intact).
      - ./deploy/nginx/default.conf.template:/etc/nginx/default.conf.template:ro
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    command: >
      /bin/sh -c "envsubst '$$SERVER_NAME $$ADMIN_PATH'
      < /etc/nginx/default.conf.template
      > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    # Attempt renewal every 12h; certbot is a no-op until certs near expiry.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  uploads:
