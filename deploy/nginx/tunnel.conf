# HTTP-only same-origin reverse proxy used for the temporary Cloudflare tunnel.
# One port serves the SPA, the /api backend and the secret admin panel, so a
# single *.trycloudflare.com URL exposes the whole stack. TLS is handled by
# Cloudflare's edge, so no certificates are needed here.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow CV uploads on the contact form.
    client_max_body_size 10m;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # --- Backend API ---
    location /api/ {
        proxy_pass http://backend:8000;
    }

    # --- Secret admin panel (no trailing slash) ---
    location = /panel-ec490bc3fb279313 {
        proxy_pass http://backend:8000;
    }

    # --- Secret admin panel (and everything beneath it) ---
    location /panel-ec490bc3fb279313/ {
        proxy_pass http://backend:8000;
    }

    # --- Frontend SPA (catch-all) ---
    location / {
        proxy_pass http://frontend:80;
    }
}
